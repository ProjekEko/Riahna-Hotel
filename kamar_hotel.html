<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kamar - Riahna Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFE;
        }

        :root {
            --primary: #0F766E;
            --primary-dark: #0D5C55;
            --primary-light: #CCFBF1;
        }

        .navbar {
            background: #0F172A;
            padding: 1rem 0;
        }

        .nav-link {
            color: #E2E8F0 !important;
        }

        .nav-link:hover {
            color: #2DD4BF !important;
        }

        .hero-detail {
            height: 50vh;
            background: linear-gradient(135deg, #0F172A, #1E293B);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-detail img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            position: relative;
            z-index: 2;
        }

        .btn-modern {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-modern:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            color: white;
        }

        .card-facility {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
        }

        .price-big {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            z-index: 1000;
        }

        footer {
            background: #0F172A;
            color: #94A3B8;
            padding: 2rem 0;
        }

        @media (max-width:768px) {
            .hero-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container"><a class="navbar-brand text-white fw-bold" href="index.html">RIAHNA</a>
            <button class="navbar-toggler bg-white" data-bs-toggle="collapse" data-bs-target="#nav"><span
                    class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#galeri">Kamar</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#kontak">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-detail"><img id="heroImg"
            src="https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=1200" alt="">
        <div class="container text-center position-relative z-2">
            <h1 class="hero-title" id="kamarTitle">Kamar <span id="nomorKamar">101</span></h1>
            <p class="text-white-50">Nikmati kenyamanan premium</p>
        </div>
    </section>

    <section class="container py-5">
        <div class="row g-5">
            <div class="col-lg-5">
                <div class="card-facility">
                    <h4><i class='bx bx-check-circle text-success'></i> Fasilitas Kamar</h4>
                    <ul class="mt-3 list-unstyled" id="fasilitasList">
                        <li>✓ AC Modern</li>
                        <li>✓ WiFi Cepat</li>
                        <li>✓ Water Heater</li>
                        <li>✓ TV 43 Inch</li>
                    </ul>
                    <hr>
                    <div class="price-big">Rp <span id="hargaDisplay">350.000</span> <span class="fs-6">/malam</span>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card-facility">
                    <h4>Form Reservasi</h4>
                    <form id="reservasiFormDetail"><input type="hidden" id="hargaHidden"><input type="hidden"
                            id="noKamarHidden">
                        <div class="row g-3">
                            <div class="col-md-6"><label>Nama Lengkap</label><input type="text" class="form-control"
                                    id="namaDetail" required></div>
                            <div class="col-md-6"><label>No. Telepon</label><input type="tel" class="form-control"
                                    id="telpDetail" required></div>
                            <div class="col-md-6"><label>Check-in</label><input type="date" class="form-control"
                                    id="checkinDetail" required></div>
                            <div class="col-md-6"><label>Check-out</label><input type="date" class="form-control"
                                    id="checkoutDetail" required></div>
                            <div class="col-md-6"><label>Email</label><input type="email" class="form-control"
                                    id="emailDetail" required></div>
                            <div class="col-md-6"><label>No. KTP</label><input type="text" class="form-control"
                                    id="ktpDetail" maxlength="16" required></div>
                            <div class="col-12"><label>Alamat</label><input type="text" class="form-control"
                                    id="alamatDetail" required></div>
                            <div class="col-12"><label>Metode Pembayaran</label><select class="form-select"
                                    id="metodeBayar">
                                    <option>Transfer Bank</option>
                                </select></div>
                            <div class="col-12"><label>DP (Minimal 10%)</label><input type="number" class="form-control"
                                    id="dpInput" placeholder="Masukkan nominal DP" required></div>
                            <div class="col-12">
                                <div class="bg-light p-3 rounded-3">
                                    <p>Total Bayar: <strong class="text-danger" id="totalBayarText">0</strong></p>
                                    <p>DP Dibayar: <strong id="dpText">0</strong> ( <span id="persenText">0</span>% )
                                    </p>
                                    <p>Sisa: <strong id="sisaText">0</strong></p>
                                </div>
                            </div>
                            <div class="col-12"><button type="submit" class="btn btn-modern w-100">Konfirmasi
                                    Reservasi</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center"><small>© 2025 Riahna Boutique Hotel</small></div>
    </footer>
    <a href="https://wa.me/628962137861" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const kamarData = [{
                no_kamar: "101",
                harga: 350000,
                gambar: "https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=800",
                fasilitas: ["AC Modern", "WiFi Cepat", "Water Heater", "TV 43 Inch", "Kamar Mandi Dalam"]
            },
            {
                no_kamar: "102",
                harga: 450000,
                gambar: "https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800",
                fasilitas: ["AC", "WiFi", "Bathtub", "Mini Bar", "Water Heater"]
            },
            {
                no_kamar: "103",
                harga: 550000,
                gambar: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800",
                fasilitas: ["Suite Room", "Bathtub", "WiFi", "AC", "Sofa"]
            },
            {
                no_kamar: "104",
                harga: 300000,
                gambar: "https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=800",
                fasilitas: ["AC", "WiFi", "TV", "Water Heater"]
            },
            {
                no_kamar: "105",
                harga: 500000,
                gambar: "https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=800",
                fasilitas: ["Deluxe", "Bathtub", "City View"]
            },
            {
                no_kamar: "106",
                harga: 480000,
                gambar: "https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=800",
                fasilitas: ["AC", "WiFi", "Mini Bar", "Water Heater"]
            }
        ];
        const urlParams = new URLSearchParams(window.location.search);
        let noKamar = urlParams.get('no_kamar') || '101';
        let kamar = kamarData.find(k => k.no_kamar == noKamar) || kamarData[0];
        document.getElementById('nomorKamar').innerText = kamar.no_kamar;
        document.getElementById('kamarTitle').innerHTML = `Kamar ${kamar.no_kamar}`;
        document.getElementById('heroImg').src = kamar.gambar;
        document.getElementById('hargaDisplay').innerText = kamar.harga.toLocaleString('id-ID');
        document.getElementById('hargaHidden').value = kamar.harga;
        document.getElementById('noKamarHidden').value = kamar.no_kamar;
        let fasHtml = '';
        kamar.fasilitas.forEach(f => {
            fasHtml += `<li class="mb-2"><i class='bx bx-check-circle text-success me-2'></i> ${f}</li>`;
        });
        document.getElementById('fasilitasList').innerHTML = fasHtml;

        let today = new Date().toISOString().split('T')[0];
        document.getElementById('checkinDetail').min = today;
        document.getElementById('checkoutDetail').min = today;

        function hitungTotal() {
            let checkin = new Date(document.getElementById('checkinDetail').value);
            let checkout = new Date(document.getElementById('checkoutDetail').value);
            let harga = kamar.harga;
            if (checkin && checkout && checkout > checkin) {
                let days = Math.ceil((checkout - checkin) / (1000 * 3600 * 24));
                let total = harga * days;
                document.getElementById('totalBayarText').innerText = total.toLocaleString('id-ID');
                let dpMasuk = parseFloat(document.getElementById('dpInput').value) || 0;
                let minDP = total * 0.1;
                if (dpMasuk < minDP && dpMasuk > 0) document.getElementById('dpInput').setCustomValidity(
                    `DP minimal Rp ${minDP.toLocaleString()}`);
                else document.getElementById('dpInput').setCustomValidity('');
                let persen = total > 0 ? (dpMasuk / total * 100).toFixed(1) : 0;
                document.getElementById('dpText').innerText = dpMasuk.toLocaleString();
                document.getElementById('persenText').innerText = persen;
                document.getElementById('sisaText').innerText = (total - dpMasuk).toLocaleString();
                return total;
            } else {
                document.getElementById('totalBayarText').innerText = '0';
                return 0;
            }
        }
        document.getElementById('checkinDetail').addEventListener('change', hitungTotal);
        document.getElementById('checkoutDetail').addEventListener('change', hitungTotal);
        document.getElementById('dpInput').addEventListener('input', hitungTotal);

        document.getElementById('reservasiFormDetail').addEventListener('submit', function (e) {
            e.preventDefault();
            let nama = document.getElementById('namaDetail').value;
            let telp = document.getElementById('telpDetail').value;
            let checkin = document.getElementById('checkinDetail').value;
            let checkout = document.getElementById('checkoutDetail').value;
            let ktp = document.getElementById('ktpDetail').value;
            if (!nama || !telp || !checkin || !checkout || ktp.length !== 16) {
                alert("Lengkapi data dengan benar (KTP 16 digit)");
                return;
            }
            let totalBayar = parseInt(document.getElementById('totalBayarText').innerText.replace(/\./g, '')) ||
                0;
            let dpBayar = parseInt(document.getElementById('dpInput').value) || 0;
            if (dpBayar < totalBayar * 0.1) {
                alert(`Minimal DP 10% = Rp ${(totalBayar*0.1).toLocaleString()}`);
                return;
            }
            localStorage.setItem("finalBooking", JSON.stringify({
                nama,
                telp,
                kamar: kamar.no_kamar,
                checkin,
                checkout,
                total: totalBayar,
                dp: dpBayar,
                sisa: totalBayar - dpBayar
            }));
            window.location.href =
                `kamar_mu.html?No_Kamar=${kamar.no_kamar}&total=${totalBayar}&dp=${dpBayar}&nama=${encodeURIComponent(nama)}`;
        });
    </script>
</body>

</html>
